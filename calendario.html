<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendário | Próximo Amor</title>
    <link rel="stylesheet" href="/src/style.css">
</head>
<body>
    <header class="header">
        <div class="container flex justify-between items-center">
            <a href="/" class="logo">
                <span class="logo-icon">💙</span>
                <span>Próximo Amor</span>
            </a>
            <nav class="nav" id="nav-menu">
                <ul>
                    <li><a href="/">Home</a></li>
                    <li><a href="/vagas.html">Vagas</a></li>
                    <li><a href="/sobre.html">Sobre Nós</a></li>
                    <li><a href="/calendario.html" class="active">Calendário</a></li>
                    <li><a href="/mapa.html">Mapa</a></li>
                    <li><a href="/login.html" class="btn btn-outline btn-sm">Login</a></li>
                    <li><a href="/cadastro.html" class="btn btn-primary btn-sm">Seja Voluntário</a></li>
                </ul>
            </nav>
            <button class="menu-toggle" id="menu-toggle">☰</button>
        </div>
    </header>

    <main>
        <section class="section">
            <div class="container">
                <h1 class="mb-8 text-center">Calendário de Atividades</h1>
                <div class="calendar-header grid grid-cols-7" style="background: var(--primary-600); color: white; padding: 1rem; text-align: center; border-radius: var(--r-md) var(--r-md) 0 0;">
                    <div>Dom</div><div>Seg</div><div>Ter</div><div>Qua</div><div>Qui</div><div>Sex</div><div>Sáb</div>
                </div>
                <div class="calendar-grid" id="calendar-grid" style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: var(--border); border: 1px solid var(--border); border-radius: 0 0 var(--r-md) var(--r-md); overflow: hidden;">
                    <!-- Days injected by JS -->
                </div>
            </div>
        </section>
    </main>

    <script type="module">
        import { jobs } from '/src/data.js';
        const grid = document.getElementById('calendar-grid');
        const year = 2024, month = 4; // May
        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();

        for (let i = 0; i < firstDay; i++) {
            grid.innerHTML += `<div class="calendar-day" style="background: var(--bg-main); min-height: 120px;"></div>`;
        }

        for (let day = 1; day <= daysInMonth; day++) {
            const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
            const dayJobs = jobs.filter(j => j.date === dateStr);
            grid.innerHTML += `
                <div class="calendar-day" style="background: white; min-height: 120px; padding: 0.5rem; border: 1px solid var(--border);">
                    <strong>${day}</strong>
                    ${dayJobs.map(j => `<div style="font-size: 0.7rem; color: var(--primary-700); margin-top: 4px;">🔹 ${j.title}</div>`).join('')}
                </div>
            `;
        }
    </script>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
