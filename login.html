<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Próximo Amor</title>
    <link rel="stylesheet" href="/src/style.css">
</head>
<body>
    <div class="container" style="max-width: 400px; margin: 100px auto;">
        <div class="card">
            <h2 class="mb-4">Login</h2>
            <form id="login-form">
                <div class="form-group"><input type="email" placeholder="Email" class="form-input" required></div>
                <div class="form-group"><input type="password" placeholder="Senha" class="form-input" required></div>
                <button type="submit" class="btn btn-primary w-full">Entrar</button>
            </form>
        </div>
    </div>
    <script type="module">
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            localStorage.setItem('user_logged', 'true');
            window.location.href = '/';
        });
    </script>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
