<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa de Vagas | Próximo Amor</title>
    <link rel="stylesheet" href="/style.css">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <style>
        .leaflet-popup-content-wrapper {
            border-radius: var(--r-md);
            padding: 0.5rem;
        }
        .leaflet-popup-content h3 {
            margin-bottom: 0.5rem;
            color: var(--primary-600);
        }
        .leaflet-popup-content .btn {
            width: 100%;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container flex justify-between items-center">
            <a href="/" class="logo">
                <span class="logo-icon">💙</span>
                <span>Próximo Amor</span>
            </a>
            <nav class="nav" id="nav-menu">
                <ul>
                    <li><a href="/">Home</a></li>
                    <li><a href="/vagas.html">Vagas</a></li>
                    <li><a href="/sobre.html">Sobre Nós</a></li>
                    <li><a href="/calendario.html">Calendário</a></li>
                    <li><a href="/mapa.html" class="active">Mapa</a></li>
                    <li><a href="/login.html" class="btn btn-outline btn-sm">Login</a></li>
                    <li><a href="/cadastro.html" class="btn btn-primary btn-sm">Seja Voluntário</a></li>
                </ul>
            </nav>
            <button class="menu-toggle" id="menu-toggle">☰</button>
        </div>
    </header>

    <main>
        <section class="section">
            <div class="container">
                <div class="flex justify-between items-center mb-8">
                    <div>
                        <h1 class="mb-2">Mapa de Oportunidades</h1>
                        <p style="color: var(--text-muted);">Encontre causas próximas à sua localização.</p>
                    </div>
                    <div class="flex gap-4">
                        <button class="btn btn-outline btn-sm" onclick="locateUser()">📍 Minha Localização</button>
                    </div>
                </div>

                <div id="map"></div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container text-center" style="color: var(--text-light); font-size: 0.9rem;">
            <p>&copy; 2024 Próximo Amor. Todos os direitos reservados.</p>
        </div>
    </footer>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script type="module">
        import { jobs } from './data.js';

        // Initialize map
        const map = L.map('map').setView([-23.5505, -46.6333], 5); // Center on Brazil

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        // Add markers for each job
        jobs.forEach(job => {
            const marker = L.marker([job.lat, job.lng]).addTo(map);
            marker.bindPopup(`
                <div style="min-width: 200px;">
                    <div class="badge badge-primary mb-2" style="font-size: 0.6rem;">${job.category}</div>
                    <h3 style="font-size: 1.1rem; margin-bottom: 0.5rem;">${job.title}</h3>
                    <p style="font-size: 0.85rem; color: #64748b; margin-bottom: 1rem;">${job.location}</p>
                    <a href="/vagas.html" class="btn btn-primary btn-sm">Ver Detalhes</a>
                </div>
            `);
        });

        // Function to locate user
        window.locateUser = () => {
            map.locate({setView: true, maxZoom: 13});
        };

        map.on('locationfound', (e) => {
            L.circle(e.latlng, e.accuracy).addTo(map);
            L.marker(e.latlng).addTo(map).bindPopup("Você está aqui").openPopup();
        });

        map.on('locationerror', (e) => {
            alert("Não foi possível encontrar sua localização: " + e.message);
        });

        // Mobile Menu
        const toggle = document.getElementById('menu-toggle');
        const menu = document.getElementById('nav-menu');
        if (toggle && menu) {
            toggle.addEventListener('click', () => {
                menu.classList.toggle('active');
            });
        }
    </script>
</body>
</html>
